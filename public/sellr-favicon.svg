<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Outer disc -->
  <circle cx="16" cy="16" r="16" fill="#2C4A6E"/>
  <!-- Grooves -->
  <circle cx="16" cy="16" r="13.5" fill="none" stroke="white" stroke-width="0.4" opacity="0.2"/>
  <circle cx="16" cy="16" r="12" fill="none" stroke="white" stroke-width="0.4" opacity="0.15"/>
  <circle cx="16" cy="16" r="10.5" fill="none" stroke="white" stroke-width="0.4" opacity="0.2"/>
  <circle cx="16" cy="16" r="9" fill="none" stroke="white" stroke-width="0.4" opacity="0.15"/>
  <!-- Center label -->
  <circle cx="16" cy="16" r="6" fill="white" opacity="0.9"/>
  <!-- Dollar sign -->
  <text x="16" y="16" text-anchor="middle" dominant-baseline="central" fill="#2C4A6E" font-size="8" font-weight="700" font-family="system-ui, -apple-system, sans-serif">$</text>
