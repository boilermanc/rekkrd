<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="color-scheme" content="light">
  <meta name="supported-color-schemes" content="light">
  <title>Sellr</title>
  <!--[if mso]>
  <noscript>
    <xml>
      <o:OfficeDocumentSettings>
        <o:PixelsPerInch>96</o:PixelsPerInch>
      </o:OfficeDocumentSettings>
    </xml>
  </noscript>
  <![endif]-->
  <style>
    /* Reset */
    body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
    table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
    img { -ms-interpolation-mode: bicubic; border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; }
    body { margin: 0; padding: 0; width: 100% !important; height: 100% !important; }
    a[x-apple-data-detectors] { color: inherit !important; text-decoration: none !important; font-size: inherit !important; font-family: inherit !important; font-weight: inherit !important; line-height: inherit !important; }

    /* Typography */
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap');

    /* Responsive */
    @media only screen and (max-width: 600px) {
      .email-container { width: 100% !important; max-width: 100% !important; }
      .fluid { max-width: 100% !important; height: auto !important; }
      .stack-column { display: block !important; width: 100% !important; max-width: 100% !important; }
      .stack-column-center { text-align: center !important; }
      .center-on-narrow { text-align: center !important; display: block !important; margin-left: auto !important; margin-right: auto !important; float: none !important; }
      table.center-on-narrow { display: inline-block !important; }
      .padding-mobile { padding-left: 24px !important; padding-right: 24px !important; }
    }
  </style>
</head>
<body style="margin: 0; padding: 0; background-color: #F5F0E8; font-family: Georgia, 'Times New Roman', serif;">

  <!-- Preheader (hidden preview text) -->
  <div style="display: none; font-size: 1px; line-height: 1px; max-height: 0px; max-width: 0px; opacity: 0; overflow: hidden; mso-hide: all;">
    {{preheader_text}}
  </div>

  <!-- Outer wrapper -->
  <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background-color: #F5F0E8;">
    <tr>
      <td align="center" style="padding: 40px 16px;">

        <!-- Email container -->
        <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="600" class="email-container" style="max-width: 600px; width: 100%;">

          <!-- HEADER -->
          <tr>
            <td align="center" style="padding: 0 0 32px 0;">
              <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
                <tr>
                  <td align="center" style="padding: 16px 40px; background-color: #2C4A6E; border-radius: 16px 16px 0 0; height: 60px; box-sizing: border-box;">
                    <!-- Logo / Brand -->
                    <h1 style="margin: 0; font-family: 'Playfair Display', Georgia, serif; font-size: 28px; font-weight: 700; color: #FFFFFF; letter-spacing: 1px;">
                      Sellr
                    </h1>
                    <p style="margin: 4px 0 0 0; font-family: Georgia, 'Times New Roman', serif; font-size: 11px; color: rgba(255,255,255,0.7);">
                      A product of Rekkrd
                    </p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- CONTENT CARD -->
          <tr>
            <td style="padding: 0 0 8px 0;">
              <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background-color: #FFFFFF; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);">
                <tr>
                  <td class="padding-mobile" style="padding: 40px 48px;">
                    <!-- Headline -->
                    <h2 style="margin: 0 0 20px 0; font-family: 'Playfair Display', Georgia, serif; font-size: 28px; font-weight: 600; color: #2C4A6E; line-height: 1.3;">
                      {{headline}}
                    </h2>

                    <!-- Body -->
                    <p style="margin: 0 0 24px 0; font-family: Georgia, 'Times New Roman', serif; font-size: 16px; line-height: 1.7; color: #333333;">
                      {{body_content}}
                    </p>

                    <!-- CTA Button -->
                    <!--[if mso]>
                    <v:roundrect xmlns:v="urn:schemas-microsoft-com:vml" xmlns:w="urn:schemas-microsoft-com:office:word" href="{{cta_url}}" style="height:48px;v-text-anchor:middle;width:200px;" arcsize="17%" strokecolor="#E8A838" fillcolor="#E8A838">
                      <w:anchorlock/>
                      <center style="color:#FFFFFF;font-family:Georgia,serif;font-size:14px;font-weight:bold;">{{cta_text}}</center>
                    </v:roundrect>
                    <![endif]-->
                    <!--[if !mso]><!-->
                    <table role="presentation" cellspacing="0" cellpadding="0" border="0" align="center" style="margin: 32px auto;">
                      <tr>
                        <td style="border-radius: 8px; background-color: #E8A838;">
                          <a href="{{cta_url}}" target="_blank" style="display: inline-block; padding: 14px 24px; font-family: Georgia, 'Times New Roman', serif; font-size: 14px; font-weight: 700; color: #FFFFFF; text-decoration: none; line-height: 20px;">
                            {{cta_text}}
                          </a>
                        </td>
                      </tr>
                    </table>
                    <!--<![endif]-->
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- SECONDARY CONTENT (optional) -->
          <tr>
            <td style="padding: 0 0 8px 0;">
              <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background-color: #FFFFFF; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);">
                <tr>
                  <td class="padding-mobile" style="padding: 24px 48px;">
                    <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background-color: #F5F0E8; border-left: 3px solid #E8A838; border-radius: 4px;">
                      <tr>
                        <td style="padding: 16px;">
                          <p style="margin: 0; font-family: Georgia, 'Times New Roman', serif; font-size: 14px; line-height: 1.7; color: #333333;">
                            {{secondary_content}}
                          </p>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- FOOTER -->
          <tr>
            <td>
              <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background-color: #EDE8DF; border-radius: 0 0 16px 16px; border-top: 1px solid #E0D9CF;">
                <tr>
                  <td align="center" class="padding-mobile" style="padding: 32px 48px;">
                    <p style="margin: 0 0 8px 0; font-family: Georgia, 'Times New Roman', serif; font-size: 14px; color: #888888;">
                      Sellr &middot; A product of Rekkrd
                    </p>
                    <p style="margin: 0 0 8px 0; font-family: Georgia, serif; font-size: 12px; color: #888888;">
                      <a href="https://rekkrd.com/sellr" style="color: #888888; text-decoration: underline;">Visit Sellr</a>
                      &nbsp;&nbsp;&middot;&nbsp;&nbsp;
                      <a href="https://rekkrd.com/support" style="color: #888888; text-decoration: underline;">Support</a>
                      &nbsp;&nbsp;&middot;&nbsp;&nbsp;
                      <a href="{{{RESEND_UNSUBSCRIBE_URL}}}" style="color: #888888; text-decoration: underline;">Unsubscribe</a>
                    </p>
                    <p style="margin: 12px 0 0 0; font-family: Georgia, serif; font-size: 11px; color: #888888;">
                      &copy; {{year}} Rekkrd. All rights reserved.
                    </p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

        </table>
        <!-- End email container -->

      </td>
    </tr>
  </table>

</body>
</html>
